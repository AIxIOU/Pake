name: Build Dynamic Mobile App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "windows-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
        default: "https://steam.granbluefantasy.com"
      name:
        description: "App name"
        required: true
        default: "Granblue Fantasy Pake"
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
        default: "https://i.pinimg.com/736x/b5/aa/9f/b5aa9f947a383e8dcf7f859fdcd7fbdf.jpg"
      user_agent:
        description: "Custom User-Agent string (leave blank for default desktop UA)"
        required: false
        default: ""
      width:
        description: "Initial window width (px)"
        required: false
        default: "900"
      height:
        description: "Initial window height (px)"
        required: false
        default: "820"
      min_width:
        description: "Minimum window width (px)"
        required: false
        default: "700"
      min_height:
        description: "Minimum window height (px)"
        required: false
        default: "570"
      app_version:
        description: "App version"
        required: false
        default: "1.0.0"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      show_system_tray:
        description: "Show a system tray icon (adds built-in Show/Hide/Quit menu)"
        required: false
        type: boolean
        default: false
      hide_on_close:
        description: "Hide to tray instead of quitting when the window is closed (requires show_system_tray)"
        required: false
        type: boolean
        default: false
      start_to_tray:
        description: "Launch minimized to tray instead of showing the window (requires show_system_tray)"
        required: false
        type: boolean
        default: false
      activation_shortcut:
        description: "Global hotkey to bring the app to front from anywhere (e.g. CmdOrControl+Shift+G). Leave blank to disable."
        required: false
        default: "CmdOrControl+Shift+G"
      multi_window:
        description: "Allow opening multiple windows within a single running app instance (adds New Window to tray/File menu; relaunching also opens a new window instead of focusing the existing one)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm,zst)"
        required: false
        default: "deb"
      debug:
        description: "Debug build: enable devtools/inspect + popup diagnostics"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          # The injected script lives in the repo at .github/scripts/gbf-scaler.js
          # (keeping it out of this file avoids the 21,000-char limit on a
          # single run-block expression, and means one copy instead of two).
          SCRIPT="$GITHUB_WORKSPACE/.github/scripts/gbf-scaler.js"
          if [ ! -f "$SCRIPT" ]; then
            echo "::error::Missing $SCRIPT"
            exit 1
          fi
          
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}" "--inject" "$SCRIPT")
          if [ -n "${{ inputs.icon }}" ]; then
            ARGS+=("--icon" "${{ inputs.icon }}")
          fi
          if [ -n "${{ inputs.user_agent }}" ]; then
            ARGS+=("--user-agent" "${{ inputs.user_agent }}")
          fi
          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi
          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi
          if [ -n "${{ inputs.min_width }}" ]; then
            ARGS+=("--min-width" "${{ inputs.min_width }}")
          fi
          if [ -n "${{ inputs.min_height }}" ]; then
            ARGS+=("--min-height" "${{ inputs.min_height }}")
          fi
          if [ -n "${{ inputs.app_version }}" ]; then
            ARGS+=("--app-version" "${{ inputs.app_version }}")
          fi
          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi
          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi
          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi
          if [ "${{ inputs.show_system_tray }}" == "true" ]; then
            ARGS+=("--show-system-tray")
            if [ "${{ inputs.start_to_tray }}" == "true" ]; then
              ARGS+=("--start-to-tray")
            fi
          fi
          if [ -n "${{ inputs.hide_on_close }}" ]; then
            ARGS+=("--hide-on-close" "${{ inputs.hide_on_close }}")
          fi
          if [ -n "${{ inputs.activation_shortcut }}" ]; then
            ARGS+=("--activation-shortcut" "${{ inputs.activation_shortcut }}")
          fi
          if [ "${{ inputs.multi_window }}" == "true" ]; then
            ARGS+=("--multi-window")
          fi
          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi
          if [ "${{ inputs.debug }}" == "true" ]; then
            ARGS+=("--debug")
          fi
          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          # The injected script lives in the repo at .github/scripts/gbf-scaler.js
          # (keeping it out of this file avoids the 21,000-char limit on a
          # single run-block expression, and means one copy instead of two).
          $script = Join-Path $env:GITHUB_WORKSPACE ".github/scripts/gbf-scaler.js"
          if (-not (Test-Path $script)) {
            Write-Error "Missing $script"
            exit 1
          }
          
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}", "--inject", $script
          if ("${{ inputs.icon }}" -ne "") {
            $args += "--icon", "${{ inputs.icon }}"
          }
          if ("${{ inputs.user_agent }}" -ne "") {
            $args += "--user-agent", "${{ inputs.user_agent }}"
          }
          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }
          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }
          if ("${{ inputs.min_width }}" -ne "") {
            $args += "--min-width", "${{ inputs.min_width }}"
          }
          if ("${{ inputs.min_height }}" -ne "") {
            $args += "--min-height", "${{ inputs.min_height }}"
          }
          if ("${{ inputs.app_version }}" -ne "") {
            $args += "--app-version", "${{ inputs.app_version }}"
          }
          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }
          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }
          if ("${{ inputs.show_system_tray }}" -eq "true") {
            $args += "--show-system-tray"
            if ("${{ inputs.start_to_tray }}" -eq "true") {
              $args += "--start-to-tray"
            }
          }
          if ("${{ inputs.hide_on_close }}" -ne "") {
            $args += "--hide-on-close", "${{ inputs.hide_on_close }}"
          }
          if ("${{ inputs.activation_shortcut }}" -ne "") {
            $args += "--activation-shortcut", "${{ inputs.activation_shortcut }}"
          }
          if ("${{ inputs.multi_window }}" -eq "true") {
            $args += "--multi-window"
          }
          if ("${{ inputs.debug }}" -eq "true") {
            $args += "--debug"
          }
          Write-Host "Running: node dist/cli.js $($args -join ' ')"
          node dist/cli.js $args
          
          if (Test-Path "src-tauri/Cargo.lock") {
              git checkout -- src-tauri/Cargo.lock
          }

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-macOS
          path: "**/*.dmg"
          retention-days: 3

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-deb
          path: "**/*.deb"
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-AppImage
          path: "**/*.AppImage"
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload RPM (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-rpm
          path: "**/*.rpm"
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload ZST (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-zst
          path: "**/*.pkg.tar.zst"
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Windows
          path: "**/*.msi"
          retention-days: 3

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
